name: 24-7 Solar Sync
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install fusion-solar-py requests --quiet

      - name: Run sync
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_ID: ${{ secrets.CF_KV_ID }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: python3 sync_solar.py
