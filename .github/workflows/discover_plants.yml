name: Discover FusionSolar Plants
on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string

jobs:
  discover:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Execute Discovery
        env:
          JOB_ID: ${{ github.event.inputs.job_id }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_ID: ${{ secrets.CF_KV_ID }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          pip install fusion-solar-py requests --quiet --no-cache-dir --break-system-packages
          python3 - << 'PYEOF'
          import json, os, sys, requests, urllib3
          from fusion_solar_py.client import FusionSolarClient

          urllib3.disable_warnings()
          _orig = requests.Session.request
          def _no_verify(self, method, url, **kwargs):
              kwargs.setdefault('verify', False)
              return _orig(self, method, url, **kwargs)
          requests.Session.request = _no_verify

          jid   = os.environ['JOB_ID']
          base  = (f"https://api.cloudflare.com/client/v4/accounts/{os.environ['CF_ACCOUNT_ID']}"
                   f"/storage/kv/namespaces/{os.environ['CF_KV_ID']}/values")
          s = requests.Session()
          s.headers.update({'Authorization': f"Bearer {os.environ['CF_TOKEN']}"})

          def kv_write(key, payload):
              """Write to KV and raise immediately if the write fails."""
              r = s.put(f"{base}/{key}", json=payload, verify=True)
              r.raise_for_status()

          try:
              # Fetch temporary credentials stored by the Worker.
              r = s.get(f"{base}/DISCOVER_CREDS_{jid}", verify=True)
              r.raise_for_status()

              # Guard against 200 with empty body (edge case on CF edge network).
              raw = r.text.strip()
              if not raw:
                  raise ValueError(f"DISCOVER_CREDS_{jid} returned 200 but empty body — TTL may have expired")

              try:
                  c = json.loads(raw)
              except json.JSONDecodeError as e:
                  raise ValueError(f"DISCOVER_CREDS_{jid} is not valid JSON: {e}. Body: {raw[:200]}")

              try:
                  client = FusionSolarClient(c['username'], c['password'], huawei_subdomain=c.get('region', 'uni002eu5'))
                  stations = client.get_station_list()
              except json.JSONDecodeError as e:
                  raise RuntimeError(
                      f"FusionSolar API returned non-JSON (rate-limited or IP blocked): {e}"
                  )

              print(f"Raw stations ({len(stations)}): {stations}")
              plants = [
                  {'id': str(x.get('stationCode') or x.get('dnId') or x.get('dn')),
                   'name': x.get('stationName') or x.get('name', 'Unknown'),
                   'capacity': x.get('capacity') or x.get('onlyInverterPower') or x.get('installedCapacity') or x.get('batteryCapacity'),
                   'location': x.get('stationAddr') or x.get('plantAddress')}
                  for x in stations if x.get('stationCode') or x.get('dnId') or x.get('dn')
              ]

              kv_write(f"PLANT_DISCOVERY_{jid}", {'success': True, 'plants': plants})
              print(f"Stored {len(plants)} plants for job {jid}: {[p['id'] for p in plants]}")

          except Exception as e:
              print(f"Error: {e}", file=sys.stderr)
              try:
                  kv_write(f"PLANT_DISCOVERY_{jid}", {'success': False, 'error': str(e)})
              except Exception as kv_err:
                  print(f"KV write failed: {kv_err}", file=sys.stderr)
              sys.exit(1)
          finally:
              try:
                  s.delete(f"{base}/DISCOVER_CREDS_{jid}", verify=True)
              except Exception:
                  pass
          PYEOF
