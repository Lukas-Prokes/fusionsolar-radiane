name: Discover FusionSolar Plants
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Discovery job ID (set by Cloudflare Worker)'
        required: true
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install fusion-solar-py requests --quiet

      - name: Fetch credentials and discover plants
        env:
          JOB_ID: ${{ github.event.inputs.job_id }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_ID: ${{ secrets.CF_KV_ID }}
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/creds.json -w "%{http_code}" \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$CF_KV_ID/values/DISCOVER_CREDS_$JOB_ID")
          echo "KV fetch status: $HTTP_STATUS"
          cat /tmp/creds.json
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: KV fetch failed" >&2
            exit 1
          fi
          export HUAWEI_USER=$(python3 -c "import json; d=json.load(open('/tmp/creds.json')); print(d['username'])")
          export HUAWEI_PASS=$(python3 -c "import json; d=json.load(open('/tmp/creds.json')); print(d['password'])")
          export HUAWEI_REGION=$(python3 -c "import json; d=json.load(open('/tmp/creds.json')); print(d.get('region','uni002eu5'))")
          python3 discover_plants.py
